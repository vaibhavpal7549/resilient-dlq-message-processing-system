services:
  mongodb:
    image: mongo:6.0
    container_name: dlq-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=dlq_system
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/dlq_system --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dlq-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: dlq-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/dlq_system
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - QUEUE_NAME=message-processing
      - LOG_LEVEL=info
      - DLQ_POLICY_VERSION=git-tracked-v2
      - DLQ_SPOOL_ENABLED=true
      - DLQ_SPOOL_DIR=/workspace/scripts/unix-dlq-spool
      - DLQ_SPOOL_REPLAY_BATCH_SIZE=50
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../backend:/app
      - /app/node_modules
      - ../config:/app/config
      - ../scripts:/workspace/scripts

  worker:
    build:
      context: ../worker
      dockerfile: ../docker/Dockerfile.worker
    container_name: dlq-worker
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/dlq_system
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - QUEUE_NAME=message-processing
      - LOG_LEVEL=info
      - DLQ_POLL_INTERVAL_MS=30000
      - DLQ_BATCH_SIZE=10
      - DLQ_MAX_RETRIES=5
      - DLQ_LOCK_TIMEOUT_MS=300000
      - DLQ_OFF_PEAK_HOUR=2
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../worker:/app
      - /app/node_modules
      - ../config:/app/config

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: dlq-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  rabbitmq_data:
